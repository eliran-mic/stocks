name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stocks-bot/stocks-bot:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker tag "$IMAGE" "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stocks-bot/stocks-bot:latest"
          docker push "$IMAGE"
          docker push "us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/stocks-bot/stocks-bot:latest"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy stocks-bot \
            --image="$IMAGE" \
            --region=us-central1 \
            --platform=managed \
            --execution-environment=gen2 \
            --no-cpu-throttling \
            --min-instances=1 \
            --max-instances=1 \
            --memory=512Mi \
            --cpu=1 \
            --port=8080 \
            --service-account="stocks-bot-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-secrets="TELEGRAM_BOT_TOKEN=TELEGRAM_BOT_TOKEN:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest" \
            --update-env-vars="DATA_DIR=/mnt/gcs/data" \
            --add-volume="name=gcs-fuse,type=cloud-storage,bucket=stocks-bot-data" \
            --add-volume-mount="volume=gcs-fuse,mount-path=/mnt/gcs" \
            --allow-unauthenticated \
            --quiet

      - name: Set webhook URL
        run: |
          SERVICE_URL=$(gcloud run services describe stocks-bot \
            --region=us-central1 --format='value(status.url)')
          gcloud run services update stocks-bot \
            --region=us-central1 \
            --update-env-vars="WEBHOOK_URL=${SERVICE_URL}" \
            --quiet
